<script src="{{ '/assets/js/popper.js' | absolute_url }}"></script>
<script src="{{ '/assets/js/bootstrap.js' | absolute_url }}"></script>
<script>
    // Tooltips
    const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
    const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl))

    // Theme Switcher Logic
    const getStoredTheme = () => localStorage.getItem('theme')
    const setStoredTheme = theme => localStorage.setItem('theme', theme)

    const getPreferredTheme = () => {
        const storedTheme = getStoredTheme()
        if (storedTheme) {
            return storedTheme
        }
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
    }

    const setTheme = theme => {
        document.documentElement.setAttribute('data-bs-theme', theme)
    }

    // Initialize and bind theme toggler
    window.addEventListener('DOMContentLoaded', () => {
        setTheme(getPreferredTheme())

        const toggleBtn = document.getElementById('theme-toggle');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-bs-theme')
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark'
                setTheme(newTheme)
                setStoredTheme(newTheme)
            })
        }
        
        // Scroll/Timeline Reveal Intersection Observer
        const revealCallback = (entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    // Once visible, stop observing this element
                    observer.unobserve(entry.target);
                }
            });
        };

        const revealObserver = new IntersectionObserver(revealCallback, {
            root: null,
            threshold: 0.05,
            rootMargin: '0px 0px -40px 0px'
        });

        // Observe timeline items and card elements
        const elementsToReveal = document.querySelectorAll('.timeline-item');
        elementsToReveal.forEach(el => {
            revealObserver.observe(el);
        });
        
        // Activate timeline line drawing on scroll
        const timeline = document.querySelector('.timeline');
        if (timeline) {
            const timelineObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        timelineObserver.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.05 });
            timelineObserver.observe(timeline);
        }
    })
</script>
