<div class="sticky-top w-100 mb-4">
  <nav class="navbar navbar-expand-sm navbar-glass">
    <div class="container-lg">
      <a class="navbar-brand d-flex align-items-center" href="{{ '/' | absolute_url }}">
        <span class="fs-4 fw-bold text-gradient">PJR</span>
      </a>
      
      <div class="d-flex align-items-center order-sm-last">
        <button class="theme-toggle-btn ms-2" id="theme-toggle" aria-label="Toggle theme">
          <i class="fa-solid fa-sun sun-icon"></i>
          <i class="fa-solid fa-moon moon-icon"></i>
        </button>
        
        <button class="navbar-toggler ms-2 border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ms-auto mb-2 mb-sm-0 align-items-sm-center">
          {% for item in site.data.navigation offset:1 %}
          <li class="nav-item">
            <a class="nav-link nav-link-premium {% if page.url == item.link %}active{% endif %}" {% if page.url==item.link %}aria-current="page" {% endif %} href="{{ item.link | absolute_url }}">{{ item.name }}</a>
          </li>
          {% endfor %}
        </ul>
      </div>
    </div>
  </nav>
</div>
